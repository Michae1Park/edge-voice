# Default configuration for edge-voice.
# Override per-deployment via config/local.yaml (gitignored) or
# EDGE_VOICE__SECTION__FIELD environment variables.

mqtt:
  broker_host: "localhost"
  broker_port: 1883
  channels:
    - topic: "stt/audio_chunks_rx"
      channel_id: "rx"
    - topic: "stt/audio_chunks_tx"
      channel_id: "tx"

audio:
  sample_rate: 16000
  channels: 1
  format: "int16"

dump:
  enabled: false
  output_dir: "./dumped_audio"
  segment_secs: 10

segment_dump:
  enabled: true
  output_dir: "./dumped_vad_segments"

queues:
  ingest: 256
  routed: 128
  segment: 64
  dump: 256

repacketizer:
  incoming_ms: 20.0     # frame size arriving from ingest
  outgoing_ms: 32.0     # frame size handed to VAD (must match vad.window_samples)
  bytes_per_sample: 2   # 16-bit PCM mono

vad:
  threshold: 0.5
  window_samples: 512        # 32ms @ 16kHz
  rms_gate_enabled: false
  silence_rms_floor: 0.01    # CALIBRATE: normalized float32 RMS, not raw int16
  preroll_chunks: 3
  min_silence_duration_ms: 300  # silence required before Silero fires `end` (raise if tail-clipping)
  speech_pad_ms: 0             # padding Silero appends around detected speech
  # Emit an in-progress segment after this many seconds of NO packets on a
  # channel. Every other boundary rule needs packets to keep arriving, so
  # without this the final utterance of a stream waits until shutdown.
  # Raise it if network jitter can stall a channel mid-speech; 0 disables.
  idle_flush_s: 2.0
  # Segment-length limits, for outlier cases only: speech that runs on with
  # no pause long enough for Silero to fire `end`. Such a run otherwise
  # buffers unbounded and the pipeline emits nothing until the speaker
  # stops, so this bounds emission latency as much as segment length.
  # Ordinary turn-taking never reaches soft_cut_s and pays nothing.
  segment_limits_enabled: false
  soft_cut_s: 5.0            # past this, look for a natural pause to cut at
  soft_cut_lookahead_s: 1.0  # how far back to scan for that pause
  soft_cut_min_dip: 0.10     # dip must be this far below the current score
  max_segment_s: 7.0         # hard cap if no suitable pause is found

stt:
  # language + model_arch select the model together.
  #   language:   ar | en | es | ja | ko | uk | vi | zh
  #   model_arch: tiny | base | tiny-streaming | small-streaming | medium-streaming
  # en publishes every arch; ko only publishes "tiny". An unavailable
  # combination fails at startup listing what that language does have.
  language: "ko"
  model_arch: "tiny"
  feed_windows: 64
  # Decoder token budget. Too low truncates mid-sentence: Korean at 13.0
  # cut ~20% of every segment's tail ("무엇을 도?" for "무엇을 도와드릴까요?").
  # Output saturates at ~20 with no latency cost and no repetition up to 75;
  # 30 leaves headroom for fast speakers. Must be set -- omitting the option
  # entirely truncates worse than any explicit value.
  max_tokens_per_second: "20.0"
  identify_speakers: false
  log_api_calls: false
  save_input_wav_path: ""
  return_audio_data: false

logging:
  level: "INFO"
  json: true     # false -> pretty console renderer (dev)

webui:
  host: "127.0.0.1"  # no network on target device; kiosk browser is local-only
  port: 8080
  transcript_backlog: 50

health:
  stale_segment_warning_s: 30   # warn if no segment finalized in this long

reliability:
  # In-process worker supervision + OS-level watchdog. See docs/BUILDPLAN.md
  # Milestone 6. The two layers catch different failures: supervision restarts
  # a thread that crashes or wedges; the watchdog lets systemd restart the
  # whole process when it hangs (which supervision, wedged alongside it, can't).
  enabled: true
  tick_interval_s: 2.0     # supervisor scan + watchdog ping cadence; keep << WatchdogSec
  stall_timeout_s: 10.0    # alive + input backed up + no progress this long => wedged, restart
  max_restarts: 3          # more than this many restarts of one worker...
  restart_window_s: 60.0   # ...within this window flips it to "degraded" (stop hot-restarting)
  watchdog_enabled: true   # sd_notify pings; a no-op unless launched by systemd (NOTIFY_SOCKET set)
  