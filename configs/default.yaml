# Default configuration for edge-voice.
# Override per-deployment via config/local.yaml (gitignored) or
# EDGE_VOICE__SECTION__FIELD environment variables.

mqtt:
  broker_host: "localhost"
  broker_port: 1883
  channels:
    - topic: "stt/audio_chunks_rx"
      channel_id: "rx"
    - topic: "stt/audio_chunks_tx"
      channel_id: "tx"

audio:
  sample_rate: 16000
  channels: 1
  format: "int16"

dump:
  enabled: true
  output_dir: "./dumped_audio"
  segment_secs: 10

segment_dump:
  enabled: false
  output_dir: "./dumped_vad_segments"

queues:
  ingest: 256
  routed: 128
  segment: 64
  dump: 256

repacketizer:
  incoming_ms: 20.0     # frame size arriving from ingest
  outgoing_ms: 32.0     # frame size handed to VAD (must match vad.window_samples)
  bytes_per_sample: 2   # 16-bit PCM mono

vad:
  threshold: 0.5
  window_samples: 512        # 32ms @ 16kHz
  silence_rms_floor: 0.01    # CALIBRATE: normalized float32 RMS, not raw int16
  preroll_chunks: 3
  # Not yet consumed by VADWorker -- planned soft/hard-cut segment limits.
  soft_cut_s: 5.0
  soft_cut_lookahead_s: 1.0
  soft_cut_min_dip: 0.10
  min_silence_ms: 300
  max_segment_s: 7.0

stt:
  language: "ko"
  model: "tiny-ko"
  model_arch: 0
  feed_windows: 64
  max_tokens_per_second: "13.0"
  identify_speakers: false
  log_api_calls: false
  save_input_wav_path: ""
  return_audio_data: false

logging:
  level: "INFO"
  json: true     # false -> pretty console renderer (dev)

webui:
  host: "0.0.0.0"
  port: 8080

health:
  stale_segment_warning_s: 30   # warn if no segment finalized in this long
  