# Default configuration for edge-voice.
# Override per-deployment via config/local.yaml (gitignored) or
# EDGE_VOICE__SECTION__FIELD environment variables.

mqtt:
  broker_host: "localhost"
  broker_port: 1883
  channels:
    - topic: "stt/audio_chunks1"
      channel_id: "ch1"
    - topic: "stt/audio_chunks2"
      channel_id: "ch2"

audio:
  sample_rate: 16000
  channels: 1
  format: "int16"

vad:
  window_samples: 512        # 32ms @ 16kHz
  soft_cut_s: 5.0
  max_segment_s: 7.0

stt:
  model: "tiny-ko"
  language: "ko"
  feed_windows: 64

logging:
  level: "INFO"
  json: true                  # false -> pretty console renderer (dev)

webui:
  host: "0.0.0.0"
  port: 8080

health:
  stale_segment_warning_s: 30   # warn if no segment finalized in this long
